<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>HUMBAK · Firmy bez strony</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --orange:#E8622A;
    --clay:#C87D52;
    --blue:#A8C5DA;
    --ink:#16130F;
    --paper:#F4F0E8;
    --paper-2:#EAE3D6;
    --line:rgba(22,19,15,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Inter",system-ui,sans-serif;
    color:var(--ink);
    background:var(--paper);
    display:flex;flex-direction:column;height:100vh;overflow:hidden;
  }

  /* ---- top bar ---- */
  header{
    flex:0 0 auto;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:14px 20px;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    z-index:1000;
  }
  .brand{display:flex;align-items:baseline;gap:10px;margin-right:auto}
  .brand .mark{
    font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:22px;letter-spacing:-.01em;
  }
  .brand .mark b{color:var(--orange);font-weight:600}
  .brand .sub{font-size:12px;color:rgba(22,19,15,.55);letter-spacing:.02em}

  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  label.field{display:flex;flex-direction:column;gap:3px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:rgba(22,19,15,.5)}
  select{
    font-family:inherit;font-size:14px;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-radius:10px;
    padding:9px 12px;min-width:170px;cursor:pointer;
  }
  button.go{
    font-family:inherit;font-size:14px;font-weight:600;color:#fff;
    background:var(--orange);border:none;border-radius:10px;
    padding:11px 18px;cursor:pointer;align-self:flex-end;
    transition:transform .08s ease, filter .15s ease;
  }
  button.go:hover{filter:brightness(1.05)}
  button.go:active{transform:translateY(1px)}
  button.go:disabled{opacity:.5;cursor:wait}

  /* ---- counter strip ---- */
  .strip{
    flex:0 0 auto;
    display:flex;align-items:center;gap:14px;
    padding:8px 20px;font-size:13px;
    background:var(--paper-2);border-bottom:1px solid var(--line);
  }
  .count{font-family:"Fraunces",serif;font-weight:600;font-size:16px}
  .count b{color:var(--orange)}
  .hint{color:rgba(22,19,15,.55);margin-left:auto;font-size:12px}

  /* ---- map ---- */
  #map{flex:1 1 auto;background:var(--paper-2)}
  footer{flex:0 0 auto;padding:8px 20px;font-size:11px;line-height:1.4;color:rgba(22,19,15,.45);background:var(--paper);border-top:1px solid var(--line);text-align:center}
  footer a{color:inherit}
  .leaflet-container{font-family:inherit}

  /* custom pin */
  .pin{
    width:22px;height:22px;border-radius:50% 50% 50% 0;
    background:var(--orange);transform:rotate(-45deg);
    border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);
  }
  .pin::after{content:"";position:absolute;top:6px;left:6px;width:6px;height:6px;border-radius:50%;background:#fff}

  /* popup */
  .leaflet-popup-content-wrapper{border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.18)}
  .leaflet-popup-content{margin:14px 16px;font-size:14px;line-height:1.45}
  .pop-name{font-family:"Fraunces",serif;font-weight:600;font-size:17px;margin:0 0 2px}
  .pop-cat{font-size:12px;color:var(--clay);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  .pop-addr{color:rgba(22,19,15,.65);margin-bottom:12px}
  .pop-btn{
    display:inline-block;text-decoration:none;font-weight:600;font-size:13px;
    color:#fff;background:var(--ink);border-radius:9px;padding:9px 14px;
  }
  .pop-btn:hover{background:var(--orange)}
  .pop-note{margin-top:8px;font-size:11px;color:rgba(22,19,15,.45)}

  /* toast / error */
  .toast{
    position:absolute;left:50%;bottom:24px;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);padding:12px 18px;border-radius:12px;
    font-size:13px;max-width:80%;text-align:center;z-index:1200;
    box-shadow:0 8px 30px rgba(0,0,0,.25);display:none;
  }
  @media (max-width:640px){
    .brand .sub{display:none}
    select{min-width:130px}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="mark">HUM<b>BAK</b></span>
    <span class="sub">firmy bez własnej strony · dane: OpenStreetMap</span>
  </div>
  <div class="controls">
    <label class="field">Branża
      <select id="category">
        <option value="cafe">Kawiarnie</option>
        <option value="restaurant">Restauracje</option>
        <option value="gastro">Gastronomia (wszystko)</option>
        <option value="beauty">Uroda / fryzjer</option>
        <option value="shop">Sklepy</option>
        <option value="services">Usługi / rzemiosło</option>
      </select>
    </label>
    <button class="go" id="search">Przeszukaj ten obszar</button>
  </div>
</header>

<div class="strip">
  <span class="count" id="count">Gotowe do startu</span>
  <span class="hint">Przesuń/przybliż mapę na swój teren → kliknij „Przeszukaj ten obszar"</span>
</div>

<div id="map"></div>
<footer>
  Dane firm: <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> (licencja ODbL). Narzędzie służy do wyszukiwania firm.
</footer>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ---- map ----
const map = L.map('map', {zoomControl:true}).setView([54.5189, 18.5305], 15); // Gdynia Śródmieście
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap, &copy; CARTO · leady: OSM (ODbL)',
  maxZoom:19
}).addTo(map);

const pinIcon = L.divIcon({className:'', html:'<div class="pin"></div>', iconSize:[22,22], iconAnchor:[11,22], popupAnchor:[0,-22]});
let layer = L.layerGroup().addTo(map);

// ---- which OSM tags to fetch per category ----
const FILTERS = {
  cafe:       ['node["amenity"="cafe"]'],
  restaurant: ['node["amenity"="restaurant"]'],
  gastro:     ['node["amenity"~"cafe|restaurant|bar|pub|fast_food"]'],
  beauty:     ['node["shop"~"hairdresser|beauty"]','node["amenity"="beauty"]','node["leisure"="spa"]'],
  shop:       ['node["shop"]'],
  services:   ['node["craft"]','node["office"]','node["amenity"~"car_repair|dentist|veterinary"]'],
};

// a business counts as "no website" if none of these tags exist
const SITE_TAGS = ['website','contact:website','url','website:menu'];

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._h); t._h=setTimeout(()=>t.style.display='none',6000);
}

function googleLink(name, lat, lon){
  // szukamy nazwy zakotwiczonej na wspolrzednych firmy z OSM — dzieki temu
  // kursant lqduje w dokladnym miejscu, nawet jesli Google ma firme pod inna
  // nazwa albo nie ma jej wcale
  return 'https://www.google.com/maps/search/' + encodeURIComponent(name) + '/@' + lat + ',' + lon + ',17z';
}

async function search(){
  const z = map.getZoom();
  if(z < 13){ toast('Przybliż trochę (min. zoom 13) — inaczej obszar jest za duży i Overpass się wykłada.'); return; }

  const b = map.getBounds();
  const bbox = [b.getSouth(), b.getWest(), b.getNorth(), b.getEast()].join(',');
  const cat = document.getElementById('category').value;
  const selectors = FILTERS[cat].map(s => `${s}(${bbox});`).join('');
  const query = `[out:json][timeout:25];(${selectors});out center tags 600;`;

  const btn = document.getElementById('search');
  const count = document.getElementById('count');
  btn.disabled = true; count.innerHTML = 'Szukam…';
  layer.clearLayers();

  try{
    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'data=' + encodeURIComponent(query)
    });
    if(!res.ok) throw new Error('Overpass ' + res.status);
    const data = await res.json();

    let hits = 0;
    for(const el of data.elements){
      const t = el.tags || {};
      if(!t.name) continue;                                   // bez nazwy nie ma czego pokazać
      if(SITE_TAGS.some(k => t[k])) continue;                 // ma stronę → pomijamy
      const phone = t.phone || t['contact:phone'] || t['contact:mobile'];
      if(!phone) continue;                                    // FILTR JAKOSCI (niewidoczny): bez telefonu w OSM pomijamy — to glownie duchy. Numeru NIE wyswietlamy.
      const lat = el.lat ?? el.center?.lat;
      const lon = el.lon ?? el.center?.lon;
      if(lat == null || lon == null) continue;

      const cat = t.amenity || t.shop || t.craft || t.office || t.leisure || 'firma';
      const addr = [t['addr:street'], t['addr:housenumber'], t['addr:city']].filter(Boolean).join(' ');
      const html = `
        <p class="pop-name">${esc(t.name)}</p>
        <div class="pop-cat">${esc(cat).replace(/_/g,' ')}</div>
        ${addr ? `<div class="pop-addr">${esc(addr)}</div>` : ''}
        <a class="pop-btn" target="_blank" rel="noopener" href="${googleLink(t.name, lat, lon)}">Otwórz w Google Maps →</a>
        <div class="pop-note">pinezka z OpenStreetMap — zweryfikuj w Google</div>`;
      L.marker([lat,lon],{icon:pinIcon}).bindPopup(html).addTo(layer);
      hits++;
    }

    count.innerHTML = hits
      ? `<b>${hits}</b> firm bez strony w tym widoku`
      : 'Zero trafień — to nie błąd. W tym wycinku nie ma firm pasujących do filtra. Przesuń mapę albo zmień branżę.';
  }catch(err){
    count.innerHTML = 'Nie udało się pobrać danych';
    toast('Pobranie z OSM nie wyszło: ' + err.message + '. W podglądzie czatu sieć bywa blokowana — otwórz/wdroż ten plik w przeglądarce, wtedy działa.');
  }finally{
    btn.disabled = false;
  }
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

document.getElementById('search').addEventListener('click', search);
document.getElementById('category').addEventListener('change', search);

// celowo NIE szukamy automatycznie — kursant najpierw wybiera teren i branzbe,
// potem klika „Przeszukaj". Mniej zaskoczenia losowymi pinezkami, mniej zbednych zapytan.
</script>
</body>
</html>
